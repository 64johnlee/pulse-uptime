# Local development services for Pulse.
#
#   docker compose up -d db      # start Postgres in the background
#   pnpm db:migrate              # apply migrations
#   docker compose down          # stop (add -v to wipe data)
#
# Credentials here are LOCAL-ONLY defaults and match .env.example. Production
# uses a managed Postgres with secrets injected via the environment.
services:
  db:
    image: postgres:16-alpine
    container_name: pulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pulse-pgdata:
