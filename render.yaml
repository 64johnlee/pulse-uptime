services:
  - type: web
    name: pulse
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @pulse/web build
    startCommand: cd apps/web && NODE_ENV=production pnpm start
    rootDir: apps/web
    envVars:
      - key: DATABASE_URL
        scope: build

