services:
  - type: web
    name: pulse
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @pulse/web build
    startCommand: cd apps/web && pnpm start
    rootDir: apps/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: build

